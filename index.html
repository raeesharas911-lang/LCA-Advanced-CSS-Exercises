<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Showcase</title>
    <link rel="stylesheet" href="week5_ex01_style.css">
</head>
<body>

    <header>

    <main class="product-container">

        </div>

        </div>

            <img src="https://via.placeholder.com/300" alt="Product 3">

            <p class="price">R299</p>

        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="Product 4">
            <h2>Product 4</h2>
            <p class="price">R179</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="Product 5">
            <h2>Product 5</h2>
            <p class="price">R349</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">

            <p class="price">R399</p>

        </div>

    </main>

</body>
</html>
